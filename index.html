<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <title>LinguaCampus - Escuela de Idiomas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mejoras.css">
    <style>
        :root {
            --primary: #6366f1; /* Indigo vibrante */
            --primary-dark: #4f46e5;
            --accent: #ec4899; /* Rosa para resaltar */
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f1f5f9;
            --sidebar: #1e293b;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-dark: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
        }

        /* Modo Oscuro */
        body[data-theme="dark"] {
            --primary: #818cf8; 
            --primary-dark: #6366f1;
            --secondary: #94a3b8;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --bg: #0f172a; /* Navy profundo */
            --sidebar: #020617; 
            --text-main: #f1f5f9; 
            --text-muted: #a0aec0; /* Texto gris claro */
            --white: #2d3748; /* Elementos que eran blancos, ahora gris oscuro */
            --shadow: var(--shadow-dark);
            color: var(--text-main); /* Asegura que el color de texto principal se aplique */
            background-color: var(--bg); /* Asegura que el color de fondo principal se aplique */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.3s, border-color 0.3s; }
        
        .panel-centrado {
            max-width: 450px; margin: 100px auto; background: var(--white);
            padding: 3rem; border-radius: 1.5rem; box-shadow: var(--shadow); text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; letter-spacing: -0.05em; }
        h1 { font-size: 1.7rem; margin-bottom: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
        
        form label { display: block; text-align: left; font-size: 0.95rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-muted); }
        input, select, textarea {
            width: 100%; padding: 0.85rem 1rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;
            margin-bottom: 1.5rem; font-family: inherit; transition: all 0.2s; background: #fff; font-size: 1.05rem;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        button {
            width: 100%; padding: 0.9rem; background: var(--primary); color: white;
            border: none; border-radius: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3); font-size: 1.05rem;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4); filter: brightness(1.1); }
        button:active { transform: translateY(0); }

        .error { color: var(--danger); font-size: 0.875rem; margin-top: 1rem; font-weight: 500; }
        .input-error {
            border-color: var(--danger) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2) !important;
        }

        header {
            background: var(--white); padding: 0.75rem 2rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px); background: rgba(var(--white), 0.8);
        }
        header h1 { margin-bottom: 0; font-weight: 800; color: var(--primary); font-size: 1.4rem; }
        header div { display: flex; align-items: center; gap: 0.75rem; } /* Para alinear el nuevo botón */
        #btn-logout, #btn-toggle-dark-mode { width: auto; background: #f1f5f9; color: var(--text-main); padding: 0.5rem 1rem; font-size: 0.875rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; cursor: pointer; transition: background 0.2s, color 0.2s; }
        #btn-logout:hover { background: #e2e8f0; }
        #btn-toggle-dark-mode:hover { background: #e2e8f0; }
        body[data-theme="dark"] header { border-bottom-color: #1e293b; }
        body[data-theme="dark"] #btn-logout, body[data-theme="dark"] #btn-toggle-dark-mode { background: #1e293b; color: var(--text-main); border-color: #334155; }
        body[data-theme="dark"] #btn-logout:hover, body[data-theme="dark"] #btn-toggle-dark-mode:hover { background: #4a5568; color: var(--white); }


        .contenedor-flex { display: flex; min-height: calc(100vh - 65px); }
        /* Ajustes para el modo oscuro en el menú lateral */
        #menu-lateral { width: 260px; background: var(--sidebar); color: white; padding: 1.5rem 0; flex-shrink: 0; box-shadow: 4px 0 15px rgba(0,0,0,0.05); }
        #menu-lateral ul { list-style: none; }
        #menu-lateral li a {
            display: block; padding: 0.9rem 1.5rem; color: #94a3b8; text-decoration: none;
            transition: all 0.2s; border-left: 4px solid transparent; font-size: 0.9375rem;
        }
        #menu-lateral li a:hover { background: #334155; color: white; border-left-color: var(--primary); }
        body[data-theme="dark"] #menu-lateral li a:hover { background: #4a5568; color: var(--text-main); border-left-color: var(--primary); }
        #menu-lateral li a.activo { background: #334155; color: white; border-left-color: var(--primary); font-weight: 500; }

        main { flex: 1; padding: 2.5rem; overflow-x: hidden; }
        h2 { margin-bottom: 1.5rem; font-weight: 700; color: var(--text-main); }
        
        .form-crud {
            background: var(--white); padding: 1.5rem; border-radius: 0.75rem;
            box-shadow: var(--shadow); margin-bottom: 2rem; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; align-items: end;
        }
        .form-crud button { height: 45px; margin-bottom: 1.25rem; background: var(--success); box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2); }
        body[data-theme="dark"] .form-crud input, body[data-theme="dark"] .form-crud select, body[data-theme="dark"] .form-crud textarea { background: #4a5568; border-color: #64748b; color: var(--text-main); }
        body[data-theme="dark"] .form-crud input:focus, body[data-theme="dark"] .form-crud select:focus { box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.3); }
        .input-busqueda { max-width: 350px; margin-bottom: 1.5rem; border-radius: 2rem; padding-left: 1.25rem; }
        body[data-theme="dark"] .input-busqueda { background: #4a5568; border-color: #64748b; color: var(--text-main); }

        .table-responsive { width: 100%; overflow-x: auto; background: var(--white); border-radius: 0.75rem; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(var(--primary), 0.05); text-align: left; padding: 1.2rem 1rem; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; border-bottom: 2px solid #f1f5f9; letter-spacing: 0.05em; }
        td { padding: 1rem; border-bottom: 1px solid #4a5568; font-size: 0.875rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(99, 102, 241, 0.03); }
        body[data-theme="dark"] tr:hover { background: rgba(255, 255, 255, 0.02); }
        body[data-theme="dark"] th { background: #1e293b; border-bottom-color: #334155; }
        body[data-theme="dark"] td { border-bottom-color: #4a5568; }
        
        .btn-editar, .btn-eliminar { width: auto; padding: 0.4rem 0.75rem; font-size: 0.75rem; margin-right: 0.5rem; border-radius: 0.375rem; }
        .btn-editar { background: #fef3c7; color: #92400e; }
        .btn-editar:hover { background: #fde68a; }
        .btn-eliminar { background: #fee2e2; color: #991b1b; }
        .btn-eliminar:hover { background: #fecaca; }

        /* Ajustes para el modo oscuro en badges */
        /* Estilos para los estados de registros */
        .badge { display: inline-flex; align-items: center; padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; line-height: 1; }
        .badge.success { background-color: #d1fae5; color: #065f46; }
        .badge.danger { background-color: #fee2e2; color: #991b1b; }
        body[data-theme="dark"] .badge.success { background-color: #166534; color: #dcfce7; }
        body[data-theme="dark"] .badge.danger { background-color: #7f1d1d; color: #fee2e2; }


        /* Estilos para el modal - Oculto por defecto */
        .modal-oculto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-oculto.activo { display: flex; }
        .modal-contenido { background: var(--white); padding: 2.5rem; border-radius: 1rem; box-shadow: var(--shadow); text-align: center; }
        .modal-contenido button { width: auto; margin: 0.5rem; padding: 0.6rem 1.5rem; }
        #modal-aceptar { background: var(--danger); }
        #modal-cancelar { background: #f1f5f9; color: var(--text-main); border: 1px solid #e2e8f0; } /* Mantener estilo claro para cancelar */
        body[data-theme="dark"] #modal-aceptar { background: var(--danger); }
        body[data-theme="dark"] #modal-cancelar { background: var(--white); color: var(--text-main); border-color: #4a5568; }
        body[data-theme="dark"] .modal-contenido { background: var(--sidebar); color: var(--text-main); }

        .calendario-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
            background: var(--text-muted); border-radius: 0.5rem; overflow: hidden; box-shadow: var(--shadow);
        }
        .calendario-dia { background: white; min-height: 100px; padding: 0.75rem; transition: background 0.2s; }
        .calendario-dia.clase { background: #eff6ff; color: var(--primary); font-weight: 600; }
        .calendario-dia.hoy { background: #fff7ed; border: 2px solid var(--warning); }
        
        #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 1000; }
        .toast {
            padding: 1rem 1.5rem; border-radius: 0.5rem; color: white; margin-top: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); font-weight: 500;
        }
        body[data-theme="dark"] .calendario-dia { background: var(--white); }
        body[data-theme="dark"] .calendario-dia.clase { background: #3b82f6; color: var(--white); }
        body[data-theme="dark"] .calendario-dia.hoy { background: #fbbf24; border-color: #f59e0b; color: var(--text-main); }
        body[data-theme="dark"] .calendario-grid { background: #4a5568; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        @media (max-width: 768px) {
            .contenedor-flex { flex-direction: column; }
            #menu-lateral { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- ==================== PANEL DE LOGIN ==================== -->
    <div id="login-panel" class="panel-centrado">
        <div class="logo">🏫 LinguaCampus</div>
        <h1>Iniciar Sesión</h1>
        <form id="form-login" autocomplete="off">
            <label for="login-usuario">Usuario</label>
            <input type="text" id="login-usuario" placeholder="" autocomplete="off" readonly onfocus="this.removeAttribute('readonly');" required>
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" placeholder="" autocomplete="new-password" readonly onfocus="this.removeAttribute('readonly');" required>
            <button type="submit">Ingresar</button>
        </form>
        <p id="login-error" class="error"></p>
    </div>

    <!-- ==================== DASHBOARD (oculto hasta login) ==================== -->
    <div id="dashboard" style="display:none;">
        <header>
            <h1>🏫 LinguaCampus</h1>
            <div>
                <span id="usuario-activo"></span>
                <button id="btn-toggle-dark-mode" title="Alternar modo oscuro">🌙</button>
                <button id="btn-logout">Cerrar sesión</button>
            </div>
        </header>
        <div class="contenedor-flex">
            <nav id="menu-lateral">
                <ul>
                    <li><a href="#" data-modulo="estudiantes">👨‍🎓 Estudiantes</a></li>
                    <li><a href="#" data-modulo="docentes">👩‍🏫 Docentes</a></li>
                    <li><a href="#" data-modulo="idiomas">🌐 Idiomas</a></li>
                    <li><a href="#" data-modulo="niveles">📊 Niveles</a></li>
                    <li><a href="#" data-modulo="grupos">📚 Grupos</a></li>
                    <li><a href="#" data-modulo="inscripciones">📝 Inscripciones</a></li>
                    <li><a href="#" data-modulo="evaluaciones">📋 Evaluaciones</a></li>
                    <li><a href="#" data-modulo="certificados">🏅 Certificados</a></li>
                    <li><a href="#" data-modulo="calendario">📅 Calendario</a></li>
                </ul>
            </nav>
            <main id="contenido-principal"></main>
        </div>
    </div>

    <!-- Modal de confirmación -->
    <div id="modal-confirm" class="modal-oculto">
        <div class="modal-contenido">
            <p id="modal-mensaje"></p>
            <button id="modal-aceptar">Aceptar</button>
            <button id="modal-cancelar">Cancelar</button>
        </div>
    </div>

    <!-- Contenedor de notificaciones toast -->
    <div id="toast-container"></div>

    <script src="js/app.js"></script>
    <script src="js/mejoras.js"></script>
</body>
</html>
